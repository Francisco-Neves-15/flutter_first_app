name: flutter_first_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: 3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  uuid: 4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/easywatchlist-logo-black.png
    - assets/images/easywatchlist-logo-white.png

  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist/Urbanist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Urbanist/Urbanist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Urbanist/Urbanist-Italic.ttf
          style: italic